# EV3 Deployment Configuration
# Included by the root Makefile via '-include robot/controller/deploy.conf'.
# All variables use ?= so that environment variables and make command-line
# arguments always take precedence over the values set here.
#
# Local dev workflow (LAN deploy):
#   EV3_IP=192.168.1.xx make deploy-robot
# or set EV3_IP below and just run:
#   make deploy-robot
#
# CI/CD overrides:
#   GitHub Secrets EV3_IP, EV3_SSH_PORT, EV3_SSH_PRIVATE_KEY are injected
#   as environment variables by the deploy-robot.yml workflow and automatically
#   override the values set here.

# Target host — public IP, dynamic-DNS hostname, or LAN IP for direct deploys
EV3_IP ?= 192.168.1.100

# SSH user on the EV3 (ev3dev default is "robot")
EV3_USER ?= robot

# SSH port — 22 for standard; change if router port-forwards a different port
EV3_SSH_PORT ?= 22

# Destination directory on the EV3
EV3_REMOTE_PATH ?= /home/robot/controller
