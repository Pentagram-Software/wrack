steps:
# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/mindstorms-controller:${SHORT_SHA}', '.']

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/mindstorms-controller:${SHORT_SHA}']

# Deploy controlRobot Cloud Function
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'functions'
  - 'deploy'
  - 'controlRobot'
  - '--runtime=nodejs20'
  - '--trigger-http'
  - '--allow-unauthenticated'
  - '--region=europe-central2'
  - '--set-env-vars'
  - 'ROBOT_HOST=${_ROBOT_HOST},ROBOT_PORT=${_ROBOT_PORT},API_KEY=${_API_KEY}'

# Deploy telemetryIngestion Cloud Function
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'functions'
  - 'deploy'
  - 'telemetryIngestion'
  - '--runtime=nodejs20'
  - '--trigger-http'
  - '--allow-unauthenticated'
  - '--region=europe-central2'
  - '--set-env-vars'
  - 'API_KEY=${_API_KEY},BIGQUERY_PROJECT_ID=${_BIGQUERY_PROJECT_ID},BIGQUERY_DATASET=${_BIGQUERY_DATASET}'

# Deploy healthLegPush Cloud Function (PEN-228)
# Deployed BEFORE unifiedIngress so unifiedIngress's own deploy step below
# can read back its URL. --no-allow-unauthenticated is deliberate — its only
# caller is unifiedIngress itself (see docs/monitoring/architecture.md,
# "Authenticating the ingress -> health-leg call"), so GCP IAM handles auth
# instead of an app-level shared secret. --gen2 for the same reason as
# unifiedIngress below: the IAM/URL lookups need `--gen2` describe output.
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'functions'
  - 'deploy'
  - 'healthLegPush'
  - '--gen2'
  - '--runtime=nodejs20'
  - '--trigger-http'
  - '--no-allow-unauthenticated'
  - '--region=europe-central2'
  - '--set-env-vars'
  - 'GCP_PROJECT_ID=${_BIGQUERY_PROJECT_ID},GRAFANA_CREDENTIALS_SECRET=${_GRAFANA_CREDENTIALS_SECRET}'

# Grant healthLegPush's own runtime service account read access to the
# Grafana Cloud OTLP push credentials it needs on every push. Re-running on
# every build is a safe no-op once the binding exists.
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    HEALTH_LEG_SA=$(gcloud functions describe healthLegPush --gen2 --region=europe-central2 --format='value(serviceConfig.serviceAccountEmail)')
    gcloud secrets add-iam-policy-binding "${_GRAFANA_CREDENTIALS_SECRET}" \
      --member="serviceAccount:${HEALTH_LEG_SA}" \
      --role="roles/secretmanager.secretAccessor"

# Deploy unifiedIngress Cloud Function (PEN-227)
# --gen2 is required here (unlike controlRobot/telemetryIngestion above): the
# IAM grant step right after this one looks up the runtime service account
# via `gcloud functions describe --gen2`, which only returns serviceConfig
# for a Gen2 function. HEALTH_LEG_FUNCTION_URL is read back from the
# healthLegPush deploy above via a bash entrypoint (not a static
# substitution) since that URL isn't known until healthLegPush is deployed.
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    HEALTH_LEG_URL=$(gcloud functions describe healthLegPush --gen2 --region=europe-central2 --format='value(serviceConfig.uri)')
    gcloud functions deploy unifiedIngress \
      --gen2 \
      --runtime=nodejs20 \
      --trigger-http \
      --allow-unauthenticated \
      --region=europe-central2 \
      --set-env-vars "GCP_PROJECT_ID=${_BIGQUERY_PROJECT_ID},DEVICE_TOKENS_SECRET=${_DEVICE_TOKENS_SECRET},BIGQUERY_PROJECT_ID=${_BIGQUERY_PROJECT_ID},BIGQUERY_DATASET=${_BIGQUERY_DATASET},HEALTH_LEG_FUNCTION_URL=${HEALTH_LEG_URL}"

# Grant unifiedIngress's runtime service account access to its own auth
# secret, and the Cloud Run invoker role on healthLegPush (Gen2 Cloud
# Functions are Cloud Run services under the hood, so cross-function
# service-to-service auth is granted the same way). Without the first grant
# every real request fails authentication; without the second, every
# type=health push gets rejected with 401/403 by healthLegPush's own IAM
# check before ingress.js's code ever runs. Re-running on every build is a
# safe no-op once both bindings exist. Mirrors the equivalent step in
# .github/workflows/deploy-cloud-functions.yml — that workflow and this file
# are two independent deploy paths and neither automatically keeps the other
# in sync, so this needs to be maintained in both places.
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    RUNTIME_SA=$(gcloud functions describe unifiedIngress --gen2 --region=europe-central2 --format='value(serviceConfig.serviceAccountEmail)')
    gcloud secrets add-iam-policy-binding "${_DEVICE_TOKENS_SECRET}" \
      --member="serviceAccount:${RUNTIME_SA}" \
      --role="roles/secretmanager.secretAccessor"
    gcloud run services add-iam-policy-binding healthLegPush \
      --region=europe-central2 \
      --member="serviceAccount:${RUNTIME_SA}" \
      --role="roles/run.invoker"

# Tag the image as latest
- name: 'gcr.io/cloud-builders/docker'
  args: ['tag', 'gcr.io/$PROJECT_ID/mindstorms-controller:${SHORT_SHA}', 'gcr.io/$PROJECT_ID/mindstorms-controller:latest']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/mindstorms-controller:latest']

substitutions:
  _ROBOT_HOST: '178.183.200.201'
  _ROBOT_PORT: '27700'
  _API_KEY: 'your-secure-api-key-here'
  _BIGQUERY_PROJECT_ID: 'wrack-control'
  _BIGQUERY_DATASET: 'wrack_telemetry'
  _DEVICE_TOKENS_SECRET: 'device-tokens'
  _GRAFANA_CREDENTIALS_SECRET: 'grafana-cloud-push-credentials'

options:
  logging: CLOUD_LOGGING_ONLY