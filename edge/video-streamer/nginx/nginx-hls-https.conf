# Nginx HTTPS configuration for LL-HLS delivery
#
# Usage:
#   1. Copy or symlink this file to /etc/nginx/sites-available/hls-https
#   2. Symlink into sites-enabled:
#        ln -s /etc/nginx/sites-available/hls-https /etc/nginx/sites-enabled/
#   3. Replace placeholder paths with your actual certificate paths and HLS
#      output directory.
#   4. Reload Nginx:  nginx -t && systemctl reload nginx
#
# Certificate generation (self-signed, development only):
#   openssl req -x509 -newkey rsa:4096 -sha256 -days 365 -nodes \
#     -keyout /etc/nginx/ssl/server.key \
#     -out    /etc/nginx/ssl/server.crt \
#     -subj   "/CN=raspberrypi.local"
#
# For production use a certificate from a trusted CA (e.g. Let's Encrypt):
#   certbot --nginx -d your.domain.example

# ── Redirect all HTTP traffic to HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    return 301 https://$host$request_uri;
}

# ── HTTPS / LL-HLS delivery ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ── TLS certificate ─────────────────────────────────────────────────────
    # Replace with your certificate and key paths.
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # ── TLS protocol and cipher hardening ───────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    # Prefer TLSv1.3 AEAD suites; fall back to strong TLSv1.2 suites.
    ssl_ciphers         TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;  # Let TLSv1.3 choose freely

    # DH parameters for forward secrecy (generate once with:
    #   openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048)
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # Session resumption (improves performance on repeated connections)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # Disable for perfect forward secrecy

    # OCSP stapling (reduces latency on certificate revocation checks)
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ────────────────────────────────────────────────────
    # HSTS — tell browsers to always use HTTPS for this host.
    # Start with a short max-age (300 s) and increase once stable.
    add_header Strict-Transport-Security "max-age=300" always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-Frame-Options           "DENY"        always;

    # ── HLS content root ────────────────────────────────────────────────────
    # Replace with the directory where the HLS segmenter writes playlists and
    # segments.  On the Pi this would typically be something like:
    #   /var/hls/live/
    root /var/hls;

    # ── LL-HLS delivery ─────────────────────────────────────────────────────
    location /hls/ {
        # MIME types for HLS playlists and fMP4 segments
        types {
            application/vnd.apple.mpegurl  m3u8;
            video/mp4                      m4s mp4;
            video/MP2T                     ts;
        }
        default_type application/octet-stream;

        # Playlists must never be cached — clients need the latest version.
        # Segments can have a short TTL; they are immutable once written.
        location ~* \.m3u8$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            expires    0;

            # CORS — allow browsers and iOS WebViews on any origin to fetch
            add_header Access-Control-Allow-Origin  "*"     always;
            add_header Access-Control-Allow-Methods "GET"   always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        location ~* \.(m4s|ts|mp4)$ {
            add_header Cache-Control "max-age=10, public";

            add_header Access-Control-Allow-Origin  "*"     always;
            add_header Access-Control-Allow-Methods "GET"   always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        # Support byte-range requests (required for seekable HLS)
        add_header Accept-Ranges bytes always;

        # Disable access logs for segment requests (high volume, low value)
        access_log off;
    }

    # ── Health check endpoint ───────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Deny everything else ────────────────────────────────────────────────
    location / {
        return 404;
    }
}
