name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'cloud/functions/**'
      - '.github/workflows/deploy-cloud-functions.yml'

jobs:
  test:
    name: Test before deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/functions

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: cloud/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy controlRobot Cloud Function
        id: deploy
        run: |
          gcloud functions deploy controlRobot \
            --gen2 \
            --runtime nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --region europe-central2 \
            --source ./cloud/functions \
            --entry-point controlRobot \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars ROBOT_HOST=${{ secrets.ROBOT_HOST }},ROBOT_PORT=${{ secrets.ROBOT_PORT }},API_KEY=${{ secrets.GCP_API_KEY }},BIGQUERY_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy telemetryIngestion Cloud Function
        id: deploy-telemetry
        run: |
          gcloud functions deploy telemetryIngestion \
            --gen2 \
            --runtime nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --region europe-central2 \
            --source ./cloud/functions \
            --entry-point telemetryIngestion \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars API_KEY=${{ secrets.GCP_API_KEY }},BIGQUERY_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}

      # PEN-227: the target endpoint for EV3/Pi telemetry going forward.
      # HEALTH_LEG_FUNCTION_URL is deliberately not set — PEN-228 (the
      # health-leg push function) doesn't exist yet, so it's left unset and
      # health records fail open (logged, dropped) until that lands.
      - name: Deploy unifiedIngress Cloud Function
        id: deploy-ingress
        run: |
          gcloud functions deploy unifiedIngress \
            --gen2 \
            --runtime nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --region europe-central2 \
            --source ./cloud/functions \
            --entry-point unifiedIngress \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},DEVICE_TOKENS_SECRET=device-tokens,BIGQUERY_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}

      # setup-device-tokens.sh only prints this binding as a manual
      # instruction — nothing actually granted it, so a fresh deploy would
      # otherwise leave every request failing with a Secret Manager
      # permission error. Re-running this on every deploy is a safe no-op
      # once the binding exists.
      - name: Grant unifiedIngress access to the device-tokens secret
        run: |
          RUNTIME_SA=$(gcloud functions describe unifiedIngress \
            --gen2 \
            --region europe-central2 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format="value(serviceConfig.serviceAccountEmail)")

          gcloud secrets add-iam-policy-binding device-tokens \
            --member="serviceAccount:${RUNTIME_SA}" \
            --role="roles/secretmanager.secretAccessor" \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Tag successful deployment
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "deploy/cloud-functions/$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::8}"
          git push origin --tags

  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()

    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ *Cloud Functions deployed successfully*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Cloud Functions deployed successfully*\n*Functions:* `controlRobot`, `telemetryIngestion`, `unifiedIngress`\n*Commit:* `${{ github.sha }}` by ${{ github.actor }}\n*Branch:* `${{ github.ref_name }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify on failure
        if: needs.test.result == 'failure' || needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ *Cloud Functions deployment FAILED*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Cloud Functions deployment FAILED*\n*Commit:* `${{ github.sha }}` by ${{ github.actor }}\n*Branch:* `${{ github.ref_name }}`\n*Test:* ${{ needs.test.result }} • *Deploy:* ${{ needs.deploy.result }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run — check logs for details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
