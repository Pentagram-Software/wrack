name: Web CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/web/**'
      - '.github/workflows/ci-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'clients/web/**'
      - '.github/workflows/ci-web.yml'

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: clients/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (non-blocking until baseline fixed)
        continue-on-error: true
        run: npm run lint

      - name: Unit tests
        run: npx vitest run --project unit --passWithNoTests
