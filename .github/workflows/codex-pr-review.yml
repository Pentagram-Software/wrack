name: Codex PR review

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  codex:
    # Kluczowy warunek: nie uruchamiaj dla draft PR.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout PR merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            This is PR #${{ github.event.pull_request.number }} for ${{ github.repository }}.

            Review only the changes introduced by this PR.

            Use this range:
              ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Focus on:
            - correctness bugs
            - regressions
            - security issues
            - data loss / migration risks
            - concurrency or async problems
            - test coverage gaps
            - maintainability issues worth fixing before merge

            Be concise and specific.
            Avoid generic style comments.
            If there are no important issues, say so clearly.

            Pull request title:
            ${{ github.event.pull_request.title }}

            Pull request body:
            ${{ github.event.pull_request.body }}

  post_feedback:
    needs: codex
    if: needs.codex.outputs.final_message != ''
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });