name: Cloud Monitoring CI

on:
  push:
    branches: [main]
    paths:
      - 'cloud/monitoring/**'
      - '.github/workflows/ci-cloud-monitoring.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cloud/monitoring/**'
      - '.github/workflows/ci-cloud-monitoring.yml'

jobs:
  ci:
    name: Test cloud/monitoring/ (Grafana secret provisioning script)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pytest
        run: pip install pytest

      - name: Run write_credentials.py unit tests
        run: python -m pytest cloud/monitoring/tests/test_write_credentials.py -v

      - name: Run setup-grafana-secret.sh shell regression tests
        run: bash cloud/monitoring/tests/test_setup_grafana_secret.sh

      - name: Run EV3 dashboard JSON unit tests (PEN-231)
        run: python -m pytest cloud/monitoring/tests/test_dashboard_json.py -v

      - name: Run write_dashboard_credentials.py unit tests (PEN-231)
        run: python -m pytest cloud/monitoring/tests/test_write_dashboard_credentials.py -v

      - name: Run build_dashboard_request.py unit tests (PEN-231)
        run: python -m pytest cloud/monitoring/tests/test_build_dashboard_request.py -v

      - name: Run provision-dashboard.sh shell regression tests (PEN-231)
        run: bash cloud/monitoring/tests/test_provision_dashboard.sh
