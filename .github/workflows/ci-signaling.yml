name: Signaling Server CI

on:
  push:
    branches: [main]
    paths:
      - 'edge/signaling/**'
      - '.github/workflows/ci-signaling.yml'
  pull_request:
    branches: [main]
    paths:
      - 'edge/signaling/**'
      - '.github/workflows/ci-signaling.yml'

jobs:
  ci:
    name: Install, Typecheck & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: edge/signaling

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: edge/signaling/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test
