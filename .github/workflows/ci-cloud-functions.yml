name: Cloud Functions CI

on:
  push:
    branches: [main]
    paths:
      - 'cloud/functions/**'
      - '.github/workflows/ci-cloud-functions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cloud/functions/**'
      - '.github/workflows/ci-cloud-functions.yml'

jobs:
  ci:
    name: Install & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloud/functions

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cloud/functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
